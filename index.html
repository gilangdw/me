<!DOCTYPE html>


<html>
<head>
    <title>My Fluid Blog</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; }
        /* Keep your content above the background */
        #content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            pointer-events: none; /* Allows mouse to pass through to fluid */
        }

        /* Ensure the background stays behind everything */
        #fluid-canvas {
        pointer-events: none; /* Allows clicks to pass through to your links */
        display: block;
        }

/* Make sure your main container is transparent so the fluid is visible */
body {
    background-color: #000; /* Set a base dark color */
    margin: 0;
}
    </style>
</head>
<body>
    <div id="content"><h1>Welcome to my Blog</h1></div>
    <canvas id="fluid-canvas" style="width: 100vw; height: 100vh; position: fixed; top: 0; left: 0; z-index: -1;"></canvas>

    <script type="importmap">
  {
    "imports": {
      "webgl-fluid-enhanced": "https://esm.run/webgl-fluid-enhanced@latest"
    }
  }
</script>

<script type="module">
  import webGLFluidEnhanced from 'webgl-fluid-enhanced';

  webGLFluidEnhanced.simulation(document.querySelector('#fluid-canvas'), {
    SIM_RESOLUTION: 128,      // Quality of the fluid
    DENSITY_DISSIPATION: 0.98, // How fast the smoke disappears
    VELOCITY_DISSIPATION: 0.99,
    PRESSURE: 0.8,
    CURL: 30,                 // How much it swirls
    SPLAT_RADIUS: 0.2,        // Size of the mouse "splat"
    COLOR_PALETTE: ['#33ffcc', '#3300ff', '#000000'], // Match your site theme
    BACK_COLOR: '#000000',
    TRANSPARENT: false,
    BLOOM: true,              // Adds that "glow" look
    GUI: false                // Set to true if you want a control panel to test settings
  });
</script>
</body>
</html>
