<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>@gilangdw</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        /* The canvas fills the entire screen */
        #fluid-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        }
        /* Your text content sits on top */
        #content {
            position: relative; z-index: 10;
            color: white; text-align: center; top: 40%;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="content">
        <h1>Gilang Destya Widodo, S.T., M.Eng.</h1>
        <p>Move your mouse or touch the screen</p>
    </div>

    <canvas id="fluid-canvas"></canvas>

    <script src="fluid.js"></script>

<script>
    window.onload = function() {
        if (typeof WebGLFluid !== 'undefined') {
            WebGLFluid(document.querySelector('#fluid-canvas'), {
                SIM_RESOLUTION: 128,
                DENSITY_DISSIPATION: 0.98,
                VELOCITY_DISSIPATION: 0.99,
                CURL: 30,
                SPLAT_RADIUS: 0.3,
                SPLAT_COUNT: 5,
                BLOOM: true,
            });
        } else {
            console.error("The fluid.js file could not be found in your folder.");
        }
    };
</script>
</body>
</html>
