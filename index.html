<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>@gilangdw</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        /* The canvas fills the entire screen */
        #fluid-canvas { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
        }
        /* Your text content sits on top */
        #content {
            position: relative; z-index: 10;
            color: white; text-align: center; top: 40%;
            font-family: sans-serif; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="content">
        <h1>Gilang Destya Widodo, S.T., M.Eng.</h1>
        <p>Move your mouse or touch the screen</p>
    </div>

    <canvas id="fluid-canvas"></canvas>

    <script src="https://unpkg.com/webgl-fluid-simulation@1.1.0/dist/webgl-fluid-simulation.min.js"></script>

    <script>
        window.onload = function() {
            // Check if the library loaded
            if (typeof WebGLFluid !== 'undefined') {
                console.log("Fluid Library Loaded Successfully!");
                WebGLFluid(document.querySelector('#fluid-canvas'), {
                    SIM_RESOLUTION: 128,
                    DENSITY_DISSIPATION: 0.98,
                    VELOCITY_DISSIPATION: 0.99,
                    CURL: 30,
                    SPLAT_RADIUS: 0.3,
                    SPLAT_COUNT: 5, // Starts with 5 splashes of color
                    BLOOM: true,
                });
            } else {
                // If it still fails, let's at least change the background so it's not just black
                console.error("Library still blocked. Check AdBlocker or Firewall.");
                document.body.style.background = "linear-gradient(45deg, #000428, #004e92)";
                alert("The fluid script is being blocked by your browser/network. Try disabling AdBlocker.");
            }
        };
    </script>
</body>
</html>
