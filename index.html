<!DOCTYPE html>
<html>
<head>
    <title>My Fluid Blog</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; background: #000; }
        canvas { width: 100%; height: 100%; }
        /* Keep your content above the background */
        #content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            pointer-events: none; /* Allows mouse to pass through to fluid */
        }
    </style>
</head>
<body>
    <div id="content"><h1>Welcome to my Blog</h1></div>
    <canvas id="fluid"></canvas>

    <script src="fluid.js"></script>
</body>
</html>
