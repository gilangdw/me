<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluid Background Blog</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; overflow: hidden; 
        }
        canvas { 
            width: 100%; height: 100%; 
        }
        #content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            pointer-events: none; /* Mouse moves go through to the fluid */
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="content">
        <h1>Welcome to my Blog</h1>
        <p>Click and drag to swirl the fluid</p>
    </div>

    <canvas id="fluid"></canvas>

    <script src="https://cdn.jsdelivr.net/gh/PavelDoGreat/WebGL-Fluid-Simulation/scripts/script.js"></script>

</body>
</html>
