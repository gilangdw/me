<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Fluid Blog</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%;
            height: 100%;
            background: #000; 
            overflow: hidden; /* Prevents scrollbars from the canvas */
        }

        #fluid-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0; /* Keep it at base level */
            display: block;
        }

        #content {
            position: relative;
            z-index: 1; /* Sit ABOVE the fluid */
            color: white;
            text-align: center;
            top: 50%;
            transform: translateY(-50%);
            font-family: sans-serif;
            /* CRITICAL: Allow mouse to reach the canvas below */
            pointer-events: none; 
        }
        
        /* If you have buttons/links, re-enable mouse for them specifically */
        #content a, #content button {
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <canvas id="fluid-canvas"></canvas>

    <div id="content">
        <h1>Welcome to my Blog</h1>
        <p>Move your mouse to see the fluid!</p>
    </div>

    <script type="importmap">
      {
        "imports": {
          "webgl-fluid-enhanced": "https://esm.run/webgl-fluid-enhanced@latest"
        }
      }
    </script>

    <script type="module">
        import webGLFluidEnhanced from 'webgl-fluid-enhanced';

        const canvas = document.getElementById('fluid-canvas');
        
        webGLFluidEnhanced.config({
            SIM_RESOLUTION: 128,
            DENSITY_DISSIPATION: 0.97,
            VELOCITY_DISSIPATION: 0.98,
            PRESSURE: 0.8,
            CURL: 30,
            SPLAT_RADIUS: 0.25,
            INITIAL: true,
            MODAL: false,
            BLOOM: true,
            COLOR_PALETTE: ['#33ffcc', '#3300ff', '#8000ff']
        });

        webGLFluidEnhanced.simulation(canvas);
    </script>
</body>
</html>
