<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>@gilangdw</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    
    <script type="text/javascript" src="dat.gui.min.js"></script>
    
    <style>
        * { user-select: none; box-sizing: border-box; }
        html, body { 
            overflow: hidden; 
            background-color: #000; 
            margin: 0; 
            height: 100%; 
            width: 100%;
        }
        canvas { width: 100%; height: 100%; display: block; }

        #content {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            text-align: center;
            z-index: 10;
            pointer-events: none; /* Mouse moves through to fluid */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 100%;
        }

        /* Change 2 & 3: Bio Text Styles */
        h1 { font-size: clamp(1.8rem, 5vw, 3rem); margin: 0; }
        p { font-size: clamp(1rem, 2vw, 1.5rem); margin-top: 10px; opacity: 0.8; }

        /* Change 4: Hide social/app controls */
        .promo { display: none !important; }
        .dg .cr.function { display: none !important; }
    </style>
</head>
<body>

    <div id="content">
        <h1>Gilang Destya Widodo, S.T., M.Eng.</h1>
        <p>Fisika itu Menyenangkan</p>
    </div>

    <canvas></canvas>

    <script src="script.js"></script>

</body>
</html>
